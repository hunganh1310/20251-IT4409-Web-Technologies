services:
  zookeeper:
    image: bitnamilegacy/zookeeper:latest
    ports:
      - "2181:2181"
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    volumes:
      - zookeeper_data:/bitnami/zookeeper

  kafka:
    image: bitnamilegacy/kafka:3.6.1
    ports:
      - "9092:9092"   
      - "9094:9094"   
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,EXTERNAL://:9094
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR=1
    volumes:
      - kafka_data:/bitnami/kafka
    depends_on:
      - zookeeper

  kafka-setup:
    image: bitnamilegacy/kafka:3.6.1
    depends_on:
      - kafka
    command: [ "sh", "-c", "kafka-topics.sh --bootstrap-server kafka:9092 --list && echo 'Topics already exist?' || ( kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic test-topic --partitions 1 --replication-factor 1 && kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic weather-raw --partitions 1 --replication-factor 1 )" ]

  spark:
    image: apache/spark:3.5.1
    volumes:
      - ./spark-app:/app
      - ./ivy-cache:/home/spark/.ivy2
    command: tail -f /dev/null
    depends_on:
      - kafka

volumes:
  zookeeper_data:
    driver: local
  kafka_data:
    driver: local

